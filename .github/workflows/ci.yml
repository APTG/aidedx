name: CI

on:
  push:
    branches: [main, "claude/**", "feature/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-analysis:
    name: Static Analysis (format, lint, typecheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting (Prettier)
        run: pnpm run format:check

      - name: Lint (ESLint)
        run: pnpm run lint

      - name: Type-check (svelte-check + tsc)
        run: pnpm run check

      - name: Validate eval set (eval/intents.jsonl)
        run: pnpm run validate:eval

      # Reported, non-blocking metric: deterministic NLU coverage over the eval
      # set (issue #5). Surfaces coverage % and the LLM-fallback misses without
      # gating the build — the script always exits 0.
      - name: Deterministic NLU coverage (reported, non-blocking)
        continue-on-error: true
        run: pnpm run coverage:intents

  build:
    name: Build + Unit Tests
    runs-on: ubuntu-latest
    needs: [static-analysis]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Build SvelteKit app
        run: pnpm build
